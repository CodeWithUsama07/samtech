<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio By Sam</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-[#0B0C0E] text-white">
    <header>
      <!-- navbar starts -->
      <nav class="flex justify-between p-4 border-b-1 border-[#888]">
        <!-- logo -->
        <div class="font-[syne] font-bold text-2xl">
          UK
          <span class="text-xl text-[#a3e635]">.</span>
        </div>

        <!-- desktop hyperlinks -->
        <ul class="hidden">
          <li>Skills</li>
          <li>Projects</li>
          <li>About</li>
          <li>Contact</li>
        </ul>

        <!-- resume button -->
        <button class="hidden">
            <a href="" download="">
                Resume
            </a>
        </button>

        <!-- mobile hamburger menu -->
        <div>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-8 h-8 bg-[#a3e635] rounded-md"
            viewBox="0 0 32 32"
            fill="none"
          >
            <path
              stroke="#fff"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 8h15M5 16h22M5 24h22M5 11l3-3-3-3"
            />
          </svg>
        </div>
      </nav>
    </header>

    <main>
      <!-- hero section starts -->
      <section class="w-full h-screen">
        <div class="mx-auto px-20 py-8">
            <div class="mb-8 leading-10">
                <span class="bg-[#a2e6356e] border border-[#a3e635] px-2 py-1 rounded-md">Open for intership</span><br>
                <span class="bg-[#a2e6356e] border border-[#a3e635] px-2 py-1 rounded-md">Junior Roles</span>
            </div>
          <h1 class="text-4xl font-[syne] font-bold mb-4">
            Hi i'm
            <br />
            <span class="text-[#a3e635] text-6xl">Usama Khalid</span><br>
            I build things for the web.
          </h1>
          <p class="text-[#888] mb-8">Front-end developer in training. I craft clean, responsive interfaces using HTML, Tailwind CSS, and JavaScript — with React on the horizon.</p>
          <!-- hero buttons -->
          <div class="flex flex-wrap gap-4">
            <button class="bg-[#a3e635] text-lg text-black px-4 py-2 rounded-md font-semibold">View Projects</button>
            <button class="bg-[#131417] text-lg text-white border border-1 px-4 py-2 rounded-md font-semibold">Get in touch</button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
